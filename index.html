<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matt Newell</title>
  <script data-goatcounter="https://mattknewell.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<h1>Matt Newell</h1>

<hr>

<h2>Guestbook</h2>
<p>Leave a note. Goes straight to my inbox.</p>

<div id="success" style="display:none">
  <p>Got it — thanks for the note.</p>
</div>

<form id="guestbook">
  <p>
    <label for="name">Name</label><br>
    <input type="text" id="name" name="name" required>
  </p>
  <p>
    <label for="email">Email (optional)</label><br>
    <input type="email" id="email" name="email">
  </p>
  <p>
    <label for="message">Message</label><br>
    <textarea id="message" name="message" rows="4" cols="40" required></textarea>
  </p>
  <p>
    <button type="submit">Send note</button>
  </p>
</form>

<hr>

<h2>Find Me</h2>
<ul>
  <li><a href="https://www.linkedin.com/in/newellmatt/">LinkedIn</a></li>
  <li><a href="mailto:mattknewell@gmail.com">mattknewell@gmail.com</a></li>
</ul>

<hr>
<p><small>© 2026 Matt Newell · Portland, OR</small></p>

<script>
  var form = document.getElementById('guestbook');
  var success = document.getElementById('success');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var data = new FormData(form);
    fetch('https://formspree.io/f/xykqwdrn', {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(function(res) {
      if (res.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
      }
    });
  });
</script>

</body>
</html>
